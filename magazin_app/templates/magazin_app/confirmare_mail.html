<!DOCTYPE html>
<html>
<head>

    <title>Confirma emailul</title>
</head>

    <div style="background:white; padding:20px; border-radius:10px; max-width:600px; margin:auto;">
        <h2>Bun venit, {{ user.username }}!</h2>

        <p>Te rugam sa confirmi adresa ta de email accesand linkul de mai jos:</p>

        <p>Daca nu merge butonul, copiaza linkul:</p>
        <p>{{ link_confirmare }}</p>
    </div>
</body>
</html>
